kind: hosted
name: internal-hr-benefits-agent
protocols:
    - protocol: responses
      version: 1.0.0
resources:
  cpu: '0.25'
  memory: '0.5Gi'
environment_variables:
    - name: AZURE_OPENAI_ENDPOINT
      value: ${AZURE_OPENAI_ENDPOINT}
    #- name: FOUNDRY_PROJECT_ENDPOINT
    #  value: ${FOUNDRY_PROJECT_ENDPOINT}
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    - name: AZURE_AI_SEARCH_SERVICE_ENDPOINT
      value: ${AZURE_AI_SEARCH_SERVICE_ENDPOINT}
    - name: AZURE_AI_SEARCH_KNOWLEDGE_BASE_NAME
      value: zava-company-kb
    #- name: APPLICATIONINSIGHTS_CONNECTION_STRING
    #  value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
    - name: ENABLE_INSTRUMENTATION
      value: ${ENABLE_INSTRUMENTATION}
    - name: ENABLE_SENSITIVE_DATA
      value: ${ENABLE_SENSITIVE_DATA}